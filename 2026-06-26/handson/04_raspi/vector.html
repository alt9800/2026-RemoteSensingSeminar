<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>宇部市 農地ポリゴン</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/pmtiles@3/dist/pmtiles.js"></script>
  <style>body { margin: 0; } #map { width: 100vw; height: 100vh; }</style>
</head>
<body>
<div id="map"></div>
<script>
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol('pmtiles', protocol.tile.bind(protocol));

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      fude: {
        type: 'vector',
        url: `pmtiles://${location.origin}/fude.pmtiles`
      }
    },
    layers: [
      {
        id: 'bg',
        type: 'background',
        paint: { 'background-color': '#f2ede4' }
      },
      {
        id: 'fude-ta',
        type: 'fill',
        source: 'fude',
        'source-layer': 'fude',
        filter: ['==', ['get', 'land_type'], 100],
        paint: {
          'fill-color': '#6aaa64',
          'fill-opacity': 0.7,
          'fill-outline-color': '#4a8a44'
        }
      },
      {
        id: 'fude-hata',
        type: 'fill',
        source: 'fude',
        'source-layer': 'fude',
        filter: ['==', ['get', 'land_type'], 200],
        paint: {
          'fill-color': '#e8c87a',
          'fill-opacity': 0.7,
          'fill-outline-color': '#c8a85a'
        }
      }
    ]
  },
  center: [131.28, 34.05],
  zoom: 12
});
map.addControl(new maplibregl.GeolocateControl({
  positionOptions: { enableHighAccuracy: true },
  trackUserLocation: true
}));
</script>
</body>
</html>

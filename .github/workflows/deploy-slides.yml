name: Deploy Seminar Materials
on:
  push:
    branches: [ main ]
    paths:
      - '*/slide.md'
      - '*/handson/**'
      - '*/assets/**'
      - '.github/workflows/deploy-seminar-materials.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: 'Asia/Tokyo'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra
          npm install -g @marp-team/marp-cli

      - name: Build all materials
        run: |
          # Web 表示用 (HTML) は Jekyll によるレンダリングに任せる。
          # slide.md をそのままコピーすることで、コードブロックが
          # コピーしやすい通常の Markdown ページとして配信される。
          #
          # PDF は Marp で生成する。
          # スライドショー形式で受講者が振り返りやすいようにするため。

          mkdir -p output/slides
          mkdir -p output/handson

          for DATE_DIR in $(find . -maxdepth 1 -type d -name '[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]' | sed 's|./||' | sort); do
            echo "Processing $DATE_DIR..."

            if [ -f "$DATE_DIR/slide.md" ]; then
              echo "- Generating slides..."
              mkdir -p "output/slides/$DATE_DIR"

              if [ -d "$DATE_DIR/assets" ]; then
                cp -r "$DATE_DIR/assets" "output/slides/$DATE_DIR/"
              fi

              find "$DATE_DIR" -maxdepth 1 -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.gif" -o -name "*.svg" \) -exec cp {} "output/slides/$DATE_DIR/" \;

              # PDF 生成（Marp）
              echo "  Generating PDF..."
              marp "$DATE_DIR/slide.md" -o "output/slides/$DATE_DIR.pdf" --pdf --allow-local-files

              # Markdown コピー（Jekyll が HTML としてレンダリング）
              # gh-pages 上での画像パスに合わせて相対パスを書き換える
              cp "$DATE_DIR/slide.md" "output/slides/$DATE_DIR.md"
              sed -i "s|!\[\([^]]*\)\](assets/\([^)]*\))|![\1]($DATE_DIR/assets/\2)|g" "output/slides/$DATE_DIR.md"
              sed -i "s|!\[\([^]]*\)\](./assets/\([^)]*\))|![\1]($DATE_DIR/assets/\2)|g" "output/slides/$DATE_DIR.md"
              sed -i "s|!\[\([^]]*\)\](\([^/:)][^)]*\))|![\1]($DATE_DIR/\2)|g" "output/slides/$DATE_DIR.md"
              sed -i "s|<img\([^>]*\)src=\"assets/|<img\1src=\"$DATE_DIR/assets/|g" "output/slides/$DATE_DIR.md"
              sed -i "s|<img\([^>]*\)src=\"./assets/|<img\1src=\"$DATE_DIR/assets/|g" "output/slides/$DATE_DIR.md"
              sed -i "s|$DATE_DIR/$DATE_DIR|$DATE_DIR|g" "output/slides/$DATE_DIR.md"
            fi

            if [ -d "$DATE_DIR/handson" ]; then
              echo "- Copying handson materials..."
              cp -r "$DATE_DIR/handson" "output/handson/$DATE_DIR"
            fi
          done

      - name: Create Jekyll config
        run: |
          cat > output/_config.yml << 'CONFIG_END'
          markdown: kramdown
          highlighter: rouge
          plugins:
            - jekyll-relative-links
          kramdown:
            input: GFM
            hard_wrap: false
            auto_ids: true
            entity_output: as_char
            toc_levels: 1..6
            enable_coderay: false
          CONFIG_END

      - name: Generate index page
        run: |
          cat > output/index.html << 'INDEX_END'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>衛星データ解析技術研究会 技術セミナー（応用編）</title>
              <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500&display=swap" rel="stylesheet">
              <style>
                  * { box-sizing: border-box; margin: 0; padding: 0; }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                      background: #f0f4ee;
                  }
                  .site-header {
                      background: linear-gradient(135deg, #C8E840 0%, #9DE371 50%, #4CAF50 100%);
                      padding: 28px 24px 24px;
                      text-align: center;
                  }
                  .site-header h1 {
                      font-family: 'Kiwi Maru', serif;
                      font-size: 1.2rem;
                      font-weight: 500;
                      color: #1a2e10;
                      line-height: 1.5;
                  }
                  .site-header .year {
                      display: block;
                      font-family: 'Kiwi Maru', serif;
                      font-size: 2.2rem;
                      font-weight: 500;
                      color: #1a2e10;
                      line-height: 1.2;
                      margin-top: 4px;
                  }
                  .container {
                      max-width: 880px;
                      margin: 0 auto;
                      padding: 20px 16px;
                  }
                  .seminar {
                      background: #fff;
                      border: 1px solid #d0e4c4;
                      border-left: 4px solid #4CAF50;
                      border-radius: 6px;
                      padding: 14px 18px;
                      margin: 10px 0;
                  }
                  .seminar h2 {
                      margin: 0 0 10px 0;
                      font-size: 0.95rem;
                      color: #1a2e10;
                  }
                  .seminar h2 .date {
                      color: #6b8f5e;
                      font-weight: 400;
                      margin-right: 0.75em;
                      font-size: 0.85rem;
                  }
                  .links {
                      display: flex;
                      gap: 8px;
                      flex-wrap: wrap;
                  }
                  .links a {
                      display: inline-block;
                      padding: 5px 13px;
                      background: #4CAF50;
                      color: #fff;
                      text-decoration: none;
                      border-radius: 4px;
                      font-size: 0.8rem;
                      font-weight: 500;
                  }
                  .links a:hover { background: #3d9140; }
                  .links a.pdf { background: #c0392b; }
                  .links a.pdf:hover { background: #a93226; }
                  .links a.handson { background: #2980b9; }
                  .links a.handson:hover { background: #2171a3; }
                  .updated {
                      text-align: center;
                      color: #8aab7e;
                      margin-top: 24px;
                      font-size: 0.75rem;
                      padding-bottom: 16px;
                  }
              </style>
          </head>
          <body>
              <div class="site-header">
                  <h1>衛星データ解析技術研究会 技術セミナー（応用編）<span class="year">2026</span></h1>
              </div>
              <div class="container">
          INDEX_END

          for PDF_FILE in $(find output/slides -maxdepth 1 -name '*.pdf' | sort); do
            DATE_DIR=$(basename "$PDF_FILE" .pdf)

            TITLE=""
            if [ -f "$DATE_DIR/slide.md" ]; then
              TITLE=$(grep -m1 '^footer:' "$DATE_DIR/slide.md" 2>/dev/null \
                | sed 's/^footer:[[:space:]]*//' | tr -d '"' | tr -d "'")
            fi

            echo "<div class=\"seminar\">" >> output/index.html
            if [ -n "$TITLE" ]; then
              echo "  <h2><span class=\"date\">$DATE_DIR</span>$TITLE</h2>" >> output/index.html
            else
              echo "  <h2>$DATE_DIR</h2>" >> output/index.html
            fi
            echo "  <div class=\"links\">" >> output/index.html
            # Web: Jekyll が slide.md をレンダリングした HTML（コードブロックのコピペ用）
            [ -f "output/slides/$DATE_DIR.md" ] && echo "    <a href=\"slides/$DATE_DIR\">テキスト (HTML)</a>" >> output/index.html
            # PDF: Marp 生成のスライドショー形式（振り返り用）
            [ -f "output/slides/$DATE_DIR.pdf" ] && echo "    <a href=\"slides/$DATE_DIR.pdf\" class=\"pdf\">スライド (PDF)</a>" >> output/index.html
            [ -d "output/handson/$DATE_DIR" ] && echo "    <a href=\"handson/$DATE_DIR/\" class=\"handson\">ハンズオン</a>" >> output/index.html
            echo "  </div>" >> output/index.html
            echo "</div>" >> output/index.html
          done

          echo "<div class=\"updated\">最終更新: $(TZ='Asia/Tokyo' date '+%Y年%m月%d日 %H:%M') (JST)</div>" >> output/index.html
          echo "</div></body></html>" >> output/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          force_orphan: true
          enable_jekyll: true